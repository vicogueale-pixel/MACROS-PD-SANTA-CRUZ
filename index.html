<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Macros Policía Santa Cruz</title>

  <style>
    :root {
      --azul-oscuro: #071a33;
      --azul-medio: #0b3a70;
      --azul: #1267d6;
      --azul-claro: #45b5ff;
      --blanco: #ffffff;
      --fondo: #eef4fb;
      --texto: #122033;
      --gris: #66758a;
      --borde: #d7e2ef;
      
      --dorado: #c8a24d;
      --dorado-claro: #e0c37a;
      --negro: #08111f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--fondo);
      color: var(--texto);
      min-height: 100vh;
    }
    
.encabezado {
  background:
    linear-gradient(135deg, #020814 0%, #08162a 45%, #12345a 100%);
  color: var(--blanco);
  padding: 34px 20px 42px;
  text-align: center;
  border-radius: 0 0 34px 34px;
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
  border-bottom: 2px solid rgba(200, 162, 77, 0.35);
}

    .escudo {
      width: 76px;
      height: 76px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--azul-claro);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 42px;
    }

    .encabezado h1 {
      font-size: 28px;
      line-height: 1.15;
      margin-bottom: 9px;
      letter-spacing: 0.4px;
    }

    .encabezado .subtitulo {
      color: #bde5ff;
      font-size: 16px;
      margin-bottom: 16px;
    }

    .encabezado .descripcion {
      max-width: 520px;
      margin: 0 auto;
      color: #e8f5ff;
      font-size: 15px;
      line-height: 1.5;
    }

    .contenedor {
      width: min(100% - 28px, 720px);
      margin: -22px auto 40px;
    }

    .buscador {
      background: var(--blanco);
      padding: 14px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(25, 62, 103, 0.13);
      margin-bottom: 18px;
    }

    .buscador-contenido {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 12px 14px;
      background: #f9fbfe;
    }

    .buscador-contenido span {
      font-size: 22px;
    }

    #buscar {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--texto);
    }

    .categorias {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 14px;
      scrollbar-width: none;
    }

    .categorias::-webkit-scrollbar {
      display: none;
    }

    .categoria {
      border: 1px solid var(--borde);
      background: var(--blanco);
      color: var(--azul-medio);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
    }

.categoria.activa {
  background: linear-gradient(90deg, var(--dorado), var(--dorado-claro));
  color: var(--negro);
  border-color: var(--dorado);
  font-weight: bold;
}

    .contador {
      font-size: 14px;
      color: var(--gris);
      margin: 4px 2px 14px;
    }

    .lista-macros {
      display: grid;
      gap: 16px;
    }

    .macro {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 7px 18px rgba(25, 62, 103, 0.08);
    }

    .macro-superior {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .macro-icono {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      border-radius: 14px;
      background: #e5f2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
    }

    .macro h2 {
      font-size: 18px;
      margin-bottom: 5px;
    }

.etiqueta {
  display: inline-block;
  font-size: 12px;
  color: #3f2f0f;
  background: #f1dfb0;
  border: 1px solid #d4b05b;
  border-radius: 999px;
  padding: 4px 9px;
  font-weight: bold;
}
.texto-macro {
  background: #edf2f8;
  border-left: 4px solid var(--dorado);
      border-radius: 10px;
      padding: 13px;
      margin-bottom: 14px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .boton-copiar {
.boton-copiar {
  width: 100%;
  border: none;
  border-radius: 13px;
  padding: 13px 16px;
  background: linear-gradient(90deg, #0a1a2f, #12345a);
  color: var(--dorado-claro);
  border: 1px solid rgba(224, 195, 122, 0.45);
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

    .boton-copiar:active {
      transform: scale(0.98);
    }

    .sin-resultados {
      display: none;
      text-align: center;
      background: var(--blanco);
      border-radius: 18px;
      padding: 28px 18px;
      color: var(--gris);
    }

    .pie {
      text-align: center;
      color: var(--gris);
      font-size: 13px;
      padding: 4px 20px 28px;
    }

    .aviso {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(90px);
      background: var(--azul-oscuro);
      color: var(--blanco);
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transition: 0.25s ease;
      z-index: 100;
      font-size: 14px;
      white-space: nowrap;
    }

    .aviso.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 700px) {
      .encabezado h1 {
        font-size: 36px;
      }

      .macro {
        padding: 22px;
      }
    }
  </style>
</head>

<body>

  <header class="encabezado">
<div
  class="escudo"
  style="width:88px; height:88px; border:2px solid #c8a24d; border-radius:22px;"
  aria-label="Escudo policial"
>
  <svg viewBox="0 0 64 64" width="54" height="54" aria-hidden="true">
    <path
      d="M32 4 L52 12 V28 C52 42 43 52 32 60 C21 52 12 42 12 28 V12 Z"
      fill="#08162a"
      stroke="#e0c37a"
      stroke-width="3"
    />
    <path
      d="M32 14 L36 24 L47 24 L38 31 L42 42 L32 35 L22 42 L26 31 L17 24 L28 24 Z"
      fill="#e0c37a"
    />
  </svg>
</div>

    <h1>
MACROS DE LA<br>
<span>POLICÍA</span>
</h1>

<p class="subtitulo">
🛡️ Santa Cruz LATAM
</p>

<p class="descripcion">
Facción policial<br><br>
Macros, reglamentos y procedimientos.<br>
Consulta y copia con un solo clic.
</p>
  </header>

  <main class="contenedor">

    <section class="buscador">
      <div class="buscador-contenido">
        <span>🔎</span>

        <input
          id="buscar"
          type="search"
          placeholder="Buscar una macro..."
          autocomplete="off"
        >
      </div>
    </section>

    <section class="categorias">

      <button class="categoria activa" data-categoria="Todas">
        General
      </button>

      <button class="categoria" data-categoria="Reclutas">
        Macros Reclutas
      </button>

      <button class="categoria" data-categoria="Macros">
        Macros
      </button>

      <button class="categoria" data-categoria="RP">
        RP / Reglas de Rol
      </button>

      <button class="categoria" data-categoria="PD">
        PD / Reglamento Policial
      </button>

      <button class="categoria" data-categoria="Infracciones">
        Infracciones
      </button>

      <button class="categoria" data-categoria="Solicitud">
        Solicitud de Rol
      </button>

</section>

    <p id="contador" class="contador"></p>

    <section id="listaMacros" class="lista-macros"></section>

    <section id="sinResultados" class="sin-resultados">
      <p>🔍 No se encontraron macros con esa búsqueda.</p>
    </section>

  </main>

  <footer class="pie">
    Uso exclusivo para actividades de rol de Santa Cruz LATAM.
  </footer>

  <div id="aviso" class="aviso" role="status" aria-live="polite">
    Macro copiada correctamente
  </div>

  <script>
    const macros = [
{
  titulo: "Saludo reglamentario a un superior",
  categoria: "Macros/Reclutas",
  icono: "🫡",
  texto: "/me ¡MI MÁXIMO RESPETO, SR.(A) [RECLUTA]! [TU NOMBRE DE JUGADOR], ¡PRESENTÁNDOSE!!!"
},
     {
  titulo: "Permiso para hablar (PPH)",
  categoria: "Macros/Reclutas",
  icono: "✋",
  texto: "/me PPH - PERMISO PARA HABLAR"
},
      {
  titulo: "Advertencia de táser",
  categoria: "Macros/Reclutas",
  icono: "⚡",
  texto: "/do ¡TAZER!¡TAZERR!¡TAZER!!!"
},
      {
  titulo: "Solicitud para activar misión de patrullaje",
  categoria: "Macros/Reclutas",
  icono: "🚓",
  texto: "/flobby ¡SOLICITO PERMISO PARA SUBIR AL PISO 2 A PATRULLAJE!"
},
{
  titulo: "Solicitud de Rol",
  categoria: "Solicitud",
  icono: "📝",
  texto: "SOLICITUD DE ROL\n\nNOMBRE: ___\nRANGO: RECLUTA\nFACCIÓN: Policía\nSERVIDOR: Santa Cruz\nMENCIÓN:\n@Max065974\n@pekky21"
}
    ];

    const listaMacros = document.getElementById("listaMacros");
    const buscar = document.getElementById("buscar");
    const contador = document.getElementById("contador");
    const sinResultados = document.getElementById("sinResultados");
    const aviso = document.getElementById("aviso");
    const botonesCategoria = document.querySelectorAll(".categoria");

    let categoriaSeleccionada = "Todas";

    function crearTarjeta(macro) {
      const tarjeta = document.createElement("article");
      tarjeta.className = "macro";

      const superior = document.createElement("div");
      superior.className = "macro-superior";

      const icono = document.createElement("div");
      icono.className = "macro-icono";
      icono.textContent = macro.icono;

      const informacion = document.createElement("div");

      const titulo = document.createElement("h2");
      titulo.textContent = macro.titulo;

      const etiqueta = document.createElement("span");
      etiqueta.className = "etiqueta";
      etiqueta.textContent = macro.categoria;

      informacion.appendChild(titulo);
      informacion.appendChild(etiqueta);

      superior.appendChild(icono);
      superior.appendChild(informacion);

      const texto = document.createElement("div");
      texto.className = "texto-macro";
      texto.textContent = macro.texto;

      const boton = document.createElement("button");
      boton.type = "button";
      boton.className = "boton-copiar";
      boton.textContent = "📋 COPIAR";

      boton.addEventListener("click", function () {
        copiarMacro(macro.texto, boton);
      });

      tarjeta.appendChild(superior);
      tarjeta.appendChild(texto);
      tarjeta.appendChild(boton);

      return tarjeta;
    }

    function mostrarMacros() {
      const termino = buscar.value.trim().toLowerCase();

      const resultados = macros.filter(function (macro) {
        const coincideCategoria =
          categoriaSeleccionada === "Todas" ||
          macro.categoria === categoriaSeleccionada;

        const contenido =
          macro.titulo.toLowerCase() +
          " " +
          macro.categoria.toLowerCase() +
          " " +
          macro.texto.toLowerCase();

        const coincideBusqueda = contenido.includes(termino);

        return coincideCategoria && coincideBusqueda;
      });

      listaMacros.innerHTML = "";

      resultados.forEach(function (macro) {
        listaMacros.appendChild(crearTarjeta(macro));
      });

      contador.textContent =
        resultados.length === 1
          ? "1 macro disponible"
          : resultados.length + " macros disponibles";

      sinResultados.style.display =
        resultados.length === 0 ? "block" : "none";
    }

    async function copiarMacro(texto, boton) {
      try {
        await navigator.clipboard.writeText(texto);
      } catch (error) {
        const campoTemporal = document.createElement("textarea");
        campoTemporal.value = texto;
        campoTemporal.style.position = "fixed";
        campoTemporal.style.opacity = "0";

        document.body.appendChild(campoTemporal);
        campoTemporal.select();
        document.execCommand("copy");
        campoTemporal.remove();
      }

      const textoAnterior = boton.textContent;
      boton.textContent = "✅ COPIADO";

      aviso.classList.add("visible");

      setTimeout(function () {
        boton.textContent = textoAnterior;
        aviso.classList.remove("visible");
      }, 1800);
    }

    buscar.addEventListener("input", mostrarMacros);

    botonesCategoria.forEach(function (boton) {
      boton.addEventListener("click", function () {
        botonesCategoria.forEach(function (elemento) {
          elemento.classList.remove("activa");
        });

        boton.classList.add("activa");
        categoriaSeleccionada = boton.dataset.categoria;

        mostrarMacros();
      });
    });

    mostrarMacros();
  </script>

</body>
</html>
